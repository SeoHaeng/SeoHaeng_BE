spring:
  data:
    redis:
      host: localhost
      port: 6379

  jpa:
    hibernate:
      ddl-auto: update

    properties:
      hibernate:
        format_sql: true
        show_sql: true

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: 'jdbc:mysql://localhost:3306/seohaeng_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8'
    username: root
    password: password

api:
  prefix: /api/v1
