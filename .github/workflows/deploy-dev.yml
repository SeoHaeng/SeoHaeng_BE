name: Deploy to Development Server

on:
  push:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3

      # JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'zulu'

      # application.yml을 Actions 환경에 복사
      - name: Copy application.yml from Secrets
        run: |
          mkdir -p deploy
          echo "${{ secrets.APPLICATION_YML }}" > deploy/application.yml

      # Gradle 캐싱, 의존성 재활용
      - name: Gradle Caching
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Gradle로 빌드 실행
      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Prepare deploy folder
        run: |
          cp build/libs/*.jar deploy/
          cp Dockerfile docker-compose.yml deploy/

      # build 결과물을 아티팩트로 업로드
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: deploy/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      APP_PATH: ${{ secrets.APP_PATH }}

    steps:
      # 아티팩트 다운로드
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: deploy/

      # EC2로 빌드 파일 전송
      - name: SCP files to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "deploy/*"
          target: ${{ env.APP_PATH }}

      # 기존 컨테이너 정리, 최신 버전 배포
      - name: SSH deploy on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ${{ env.APP_PATH }}/deploy
            docker compose down --volumes
            docker image prune -f
            docker compose up --build -d